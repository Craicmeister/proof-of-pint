<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Pint ☘️</title>

    <!-- 1. FARCASTER META TAGS (Corrected URL) -->
    <meta property="fc:frame" content="vNext" />
    <meta property="fc:frame:image" content="https://proof-of-pint.vercel.app" />
    <meta property="fc:frame:button:1" content="📸 Take Pint Photo" />
    <meta name="base:app_id" content="69b9956973c302e579087532" />

    <!-- 2. FIXED FULL SDK LINK (Ends in .js) -->
    <script src="https://jsdelivr.net"></script>
</head>
<body style="text-align: center; padding: 50px; font-family: -apple-system, sans-serif; background-color: #f9fafb; color: #333;">

    <h1 style="color: #16a34a; font-size: 2.5rem; margin-bottom: 10px;">☘️ Proof of Pint</h1>
    <p id="status" style="font-size: 1.2rem; margin-bottom: 30px; min-height: 3em; padding: 0 20px;">Checking your $CRAIC status... ⏳</p>
    
    <div id="mainUI" style="display: none;">
        <button id="pintBtn" style="padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #16a34a; color: white; border: none; border-radius: 12px; cursor: pointer; width: 240px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
            📸 Take Pint Photo
        </button>
    </div>
    
    <div id="txLinkContainer" style="margin-top: 25px; display: none;">
        <a id="txLink" href="#" target="_blank" style="color: #0052FF; text-decoration: none; font-weight: bold;">View $CRAIC on BaseScan 🔗</a>
    </div>

    <p style="margin-top: 50px; color: #888; font-style: italic; font-size: 0.9rem;">Powered by $CRAIC • Built for Farcaster</p>

    <script>
        const pintBtn = document.getElementById('pintBtn');
        const status = document.getElementById('status');
        const mainUI = document.getElementById('mainUI');
        const txLinkContainer = document.getElementById('txLinkContainer');
        const txLink = document.getElementById('txLink');

        let userWalletAddress = null;

        async function init() {
            try {
                if (window.frameSdk) {
                    const context = await window.frameSdk.context;
                    userWalletAddress = context?.user?.address || context?.address; 
                    window.frameSdk.actions.ready();
                }
                
                if (userWalletAddress) {
                    status.innerText = "Wallet Linked! Ready for a pint? 🍻";
                } else {
                    status.innerText = "Open in Warpcast for auto-rewards! ☘️";
                    userWalletAddress = "0x7e1A62Ce20c3306FaEE687D1000bbcd661c1D510"; 
                }
                mainUI.style.display = "block";
            } catch (e) {
                console.error("SDK Error", e);
                mainUI.style.display = "block";
                status.innerText = "Ready to pour! 🍻";
            }
        }

        init();

        pintBtn.onclick = async () => {
            pintBtn.disabled = true;
            pintBtn.style.opacity = "0.6";
            
            status.style.color = "#333";
            txLinkContainer.style.display = "none";
            status.innerText = "Locating pub... 📍";

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) {
                        pintBtn.disabled = false;
                        pintBtn.style.opacity = "1";
                        return;
                    }

                    status.innerText = "Processing pint... 🧊";
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            
                            status.innerText = "Sending to the bar... ☘️";

                            try {
                                const response = await fetch('/api/verify', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        image_base64: compressedBase64,
                                        lat: lat,
                                        lng: lng,
                                        user_id: userWalletAddress
                                    })
                                });

                                const result = await response.json();

                                if (response.ok) {
                                    status.style.color = "#16a34a";
                                    status.innerText = result.message;
                                    if(result.tx_hash) {
                                        txLink.href = `https://basescan.org{result.tx_hash}`;
                                        txLinkContainer.style.display = "block";
                                    }
                                    if (window.frameSdk?.actions?.vibrate) window.frameSdk.actions.vibrate({ type: 'success' });
                                } else {
                                    status.style.color = "#dc2626";
                                    status.innerText = result.message || "Try a different angle! 🧐";
                                }
                            } catch (err) {
                                status.style.color = "#dc2626";
                                status.innerText = "The tap is broken. Try again! 📉";
                            } finally {
                                pintBtn.disabled = false;
                                pintBtn.style.opacity = "1";
                            }
                        };
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
                
            }, (error) => {
                status.innerText = "GPS Error: Check location settings! 📍";
                pintBtn.disabled = false;
                pintBtn.style.opacity = "1";
            });
        };
    </script>
</body>
</html>
