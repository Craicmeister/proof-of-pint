
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Pint ☘️</title>
    <meta name="fc:frame" content='{"version":"next","imageUrl":"https://proof-of-pint.vercel.app/frame.png","button":{"title":"Check-in Pint","action":{"type":"launch_frame","name":"Proof of Pint","url":"https://proof-of-pint.vercel.app","splashImageUrl":"https://proof-of-pint.vercel.app/craic.png","splashBackgroundColor":"#16a34a"}}}' />
</head>
<body style="text-align: center; padding: 20px; font-family: -apple-system, sans-serif; background-color: #f9fafb; color: #333;">

    <h1 style="color: #16a34a; font-size: 2rem; margin-bottom: 10px;">☘️ Proof of Pint</h1>
    <p id="status" style="font-size: 1.1rem; margin-bottom: 20px; min-height: 3em; padding: 0 20px;">Checking your $CRAIC status... ⏳</p>

    <!-- Camera UI -->
    <div id="cameraUI" style="display: none;">
        <video id="video" autoplay playsinline style="width: 100%; max-width: 320px; border-radius: 12px; margin-bottom: 12px;"></video>
        <br>
        <button id="snapBtn" style="padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #16a34a; color: white; border: none; border-radius: 12px; cursor: pointer; width: 240px;">
            📸 Snap Pint!
        </button>
        <canvas id="canvas" style="display:none;"></canvas>
    </div>

    <!-- MAIN UI -->
    <div id="mainUI" style="display: none;">
        <button id="pintBtn" style="padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #16a34a; color: white; border: none; border-radius: 12px; cursor: pointer; width: 240px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
            📸 Take Pint Photo
        </button>
    </div>

    <!-- SHARE BUTTON -->
    <div id="shareContainer" style="margin-top: 20px; display: none;">
        <button id="shareBtn" style="padding: 12px 24px; font-size: 1rem; font-weight: bold; background-color: #7c3aed; color: white; border: none; border-radius: 12px; cursor: pointer; width: 240px;">
            🟣 Share on Farcaster
        </button>
    </div>

    <!-- NO WALLET UI -->
    <div id="noWalletUI" style="display: none; margin-top: 10px;">
        <p style="font-size: 1rem; color: #555; margin-bottom: 20px; padding: 0 20px;">
            To earn $CRAIC you need a Farcaster account with a connected wallet.
        </p>
        <a href="https://warpcast.com" target="_blank" style="display: inline-block; padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #16a34a; color: white; border-radius: 12px; text-decoration: none; width: 240px;">
            Open in Warpcast ☘️
        </a>
        <p style="margin-top: 16px; font-size: 0.9rem; color: #888;">
            Don't have Warpcast yet? <a href="https://warpcast.com" target="_blank" style="color: #16a34a; font-weight: bold;">Download here</a>
        </p>
    </div>
    
    <div id="txLinkContainer" style="margin-top: 25px; display: none;">
        <a id="txLink" href="#" target="_blank" style="color: #0052FF; text-decoration: none; font-weight: bold;">View $CRAIC on BaseScan 🔗</a>
    </div>

    <p style="margin-top: 30px; color: #888; font-style: italic; font-size: 0.9rem;">Powered by $CRAIC</p>

    <script type="module">
        import { sdk } from 'https://esm.sh/@farcaster/miniapp-sdk';

        const pintBtn = document.getElementById('pintBtn');
        const snapBtn = document.getElementById('snapBtn');
        const shareBtn = document.getElementById('shareBtn');
        const shareContainer = document.getElementById('shareContainer');
        const status = document.getElementById('status');
        const mainUI = document.getElementById('mainUI');
        const cameraUI = document.getElementById('cameraUI');
        const noWalletUI = document.getElementById('noWalletUI');
        const txLinkContainer = document.getElementById('txLinkContainer');
        const txLink = document.getElementById('txLink');
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        let userFID = null;
        let userLocation = { lat: 53.2707, lng: -9.0568 };
        let stream = null;
        let originalCastHash = null;
        let verifiedPhotoUrl = null; // Store photo URL after verification

        async function init() {
            try {
                await new Promise(r => setTimeout(r, 500));
                sdk.actions.ready();
                await new Promise(r => setTimeout(r, 500));

                const context = await sdk.context;
                const fid = context?.user?.fid;

                // Capture original cast hash if opened from a cast embed
                if (context?.location?.type === 'cast_embed') {
                    originalCastHash = context.location.cast?.hash || null;
                }

                if (fid) {
                    userFID = `fid:${fid}`;
                    try {
                        await sdk.actions.requestCameraAndMicrophoneAccess();
                    } catch(camErr) {
                        console.log("Camera permission:", camErr);
                    }
                    status.innerText = "Wallet linked! Ready for a pint? 🍻";
                    mainUI.style.display = "block";
                } else {
                    throw new Error("No FID");
                }
            } catch(e) {
                console.error("SDK Error", e);
                status.innerText = "You need Warpcast to earn $CRAIC ☘️";
                noWalletUI.style.display = "block";
            }

            navigator.geolocation.getCurrentPosition((pos) => {
                userLocation.lat = pos.coords.latitude;
                userLocation.lng = pos.coords.longitude;
            }, (err) => {
                console.log("Location unavailable, using default", err);
            });
        }

        init();

        pintBtn.onclick = async () => {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                video.srcObject = stream;
                mainUI.style.display = "none";
                cameraUI.style.display = "block";
                status.innerText = "Point at your pint and snap! 🍺";
            } catch(err) {
                status.style.color = "#dc2626";
                status.innerText = "Camera error: " + err.message;
            }
        };

        snapBtn.onclick = async () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            if (stream) stream.getTracks().forEach(t => t.stop());
            cameraUI.style.display = "none";
            mainUI.style.display = "block";
            status.innerText = "Verifying with the bar... ☘️";
            status.style.color = "#333";

            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

            try {
                const response = await fetch('/api/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image_base64: compressedBase64,
                        lat: userLocation.lat || 53.2707,
                        lng: userLocation.lng || -9.0568,
                        user_id: userFID
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    status.style.color = "#16a34a";
                    status.innerText = result.message;
                    if (result.tx_hash) {
                        txLink.href = `https://basescan.org/tx/${result.tx_hash}`;
                        txLinkContainer.style.display = "block";
                    }
                    // Store photo URL for sharing
                    verifiedPhotoUrl = result.photo_url || null;
                    shareContainer.style.display = "block";
                    try { sdk.actions.vibrate({ type: 'success' }); } catch {}
                } else {
                    status.style.color = "#dc2626";
                    status.innerText = result.message || "Try a different angle! 🧐";
                }
            } catch (err) {
                status.style.color = "#dc2626";
                status.innerText = "The tap is broken. Try again! 📉";
            }
        };

        shareBtn.onclick = () => {
            const castText = "Just scored $CRAIC for my daily pint! ☘️🍺 Proof of Pint";
            const appUrl = "https://proof-of-pint.vercel.app";

            // Build embeds — always include app URL, add photo if available
            let embedsParam = `&embeds[]=${encodeURIComponent(appUrl)}`;
            if (verifiedPhotoUrl) {
                embedsParam += `&embeds[]=${encodeURIComponent(verifiedPhotoUrl)}`;
            }

            // Reply to original cast if opened from one, otherwise new cast
            let castUrl;
            if (originalCastHash) {
                castUrl = `https://warpcast.com/~/compose?text=${encodeURIComponent(castText)}${embedsParam}&parentCastHash=${originalCastHash}`;
            } else {
                castUrl = `https://warpcast.com/~/compose?text=${encodeURIComponent(castText)}${embedsParam}`;
            }

            try {
                sdk.actions.openUrl(castUrl);
            } catch {
                window.open(castUrl, '_blank');
            }
        };
    </script>
</body>
</html>
