
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proof of Pint ☘️</title>
    <meta name="fc:frame" content='{"version":"next","imageUrl":"https://proof-of-pint.vercel.app/frame.png","button":{"title":"Check-in Pint","action":{"type":"launch_frame","name":"Proof of Pint","url":"https://proof-of-pint.vercel.app","splashImageUrl":"https://proof-of-pint.vercel.app/craic.png","splashBackgroundColor":"#16a34a"}}}' />
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/miniapp-sdk/dist/index.min.js"></script>
</head>
<body style="text-align: center; padding: 50px; font-family: -apple-system, sans-serif; background-color: #f9fafb; color: #333;">

    <h1 style="color: #16a34a; font-size: 2.5rem; margin-bottom: 10px;">☘️ Proof of Pint</h1>
    
    <div id="debug" style="background:#f0f0f0; padding:20px; margin:20px; border-radius:8px; text-align:left; font-size:12px; font-family:monospace; word-break:break-all;">
        Loading...
    </div>

    <script>
        const debug = document.getElementById('debug');

        async function init() {
            let info = {};
            
            try {
                const sdk = miniapp?.sdk;
                sdk.actions.ready();

                // Call context() and await the promise
                const context = await sdk.context();
                info.context = JSON.stringify(context);
                info.fid = context?.user?.fid;
                info.username = context?.user?.username;

            } catch(e) {
                info.error = e.message;
            }

            debug.innerHTML = JSON.stringify(info, null, 2)
                .replace(/\n/g, '<br>')
                .replace(/ /g, '&nbsp;');
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
