<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="base:app_id" content="69b9956973c302e579087532" />
    <title>Proof of Pint ☘️</title>
</head>
<body style="text-align: center; padding: 50px; font-family: sans-serif; background-color: #f9fafb; color: #333;">

    <h1 style="color: #16a34a; font-size: 2.5rem;">☘️ Proof of Pint</h1>
    <p id="status" style="font-size: 1.2rem; margin-bottom: 30px;">Ready for a pint? 🍻</p>
    
    <div style="margin-top: 30px;">
        <button id="walletBtn" style="padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #0052FF; color: white; border: none; border-radius: 12px; cursor: pointer; width: 220px;">
            Connect Wallet
        </button>
    </div>

    <div style="margin-top: 20px;">
        <button id="pintBtn" style="padding: 15px 30px; font-size: 1.1rem; font-weight: bold; background-color: #16a34a; color: white; border: none; border-radius: 12px; cursor: pointer; width: 220px;">
            📸 Proof of Pint
        </button>
    </div>
    
    <p style="margin-top: 50px; color: #888; font-style: italic;">Powered by $CRAIC</p>

    <script>
        const pintBtn = document.getElementById('pintBtn');
        const status = document.getElementById('status');

        pintBtn.onclick = async () => {
            status.innerText = "Locating pub... 📍";

            navigator.geolocation.getCurrentPosition(async (position) => {
                const lat = position.coords.latitude;
                const lng = position.coords.longitude;
                status.innerText = "Get that pint ready! 📸";
                
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                
                input.onchange = async (e) => {
                    const file = e.target.files;
                    const reader = new FileReader();
                    
                    reader.onload = (event) => {
                        status.innerText = "Compressing pint... 🧊";
                        
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = async () => {
                            const canvas = document.createElement('canvas');
                            const MAX_WIDTH = 800; 
                            const scaleSize = MAX_WIDTH / img.width;
                            canvas.width = MAX_WIDTH;
                            canvas.height = img.height * scaleSize;

                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                            
                            status.innerText = "Verifying with $CRAIC... ☘️";

                            try {
                                // DIRECT CALL TO GOOGLE (No Vercel Proxy)
                                const response = await fetch('https://us-central1-craic-bot.cloudfunctions.net', {
                                    method: 'POST',
                                    body: JSON.stringify({
                                        image_base64: compressedBase64,
                                        lat: lat,
                                        lng: lng,
                                        user_id: "0x7e1A62Ce20c3306FaEE687D1000bbcd661c1D510" 
                                    }),
                                    headers: { 'Content-Type': 'application/json' }
                                });

                                const result = await response.json();
                                status.innerText = result.message || "Pint Verified! 🍻";
                            } catch (err) {
                                status.innerText = "Connection Error. Check internet! 📉";
                            }
                        };
                    };
                    reader.readAsDataURL(file);
                };
                input.click();
                
            }, (error) => {
                status.innerText = "GPS Error: Please allow location! 📍";
            });
        };

        document.getElementById('walletBtn').onclick = () => alert('Wallet connection coming on April 9th! 🚀');
    </script>
</body>
</html>
