<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 800px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  .container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 80px;
    width: 100%;
    padding: 0 120px;
  }
  .logo-wrap {
    flex-shrink: 0;
    width: 320px;
    height: 320px;
    border-radius: 50%;
    overflow: hidden;
    border: 6px solid #16a34a;
  }
  .logo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .text-wrap {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .title {
    font-size: 96px;
    font-weight: 800;
    color: #16a34a;
    line-height: 1;
    letter-spacing: -2px;
  }
  .tagline {
    font-size: 36px;
    color: #888;
    font-weight: 400;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="https://proof-of-pint.vercel.app/craic.png?v=1" crossorigin="anonymous" alt="Proof of Pint" />
    </div>
    <div class="text-wrap">
      <div class="title">Proof<br>of Pint</div>
      <div class="tagline">☘️ Powered by the CRAIC</div>
    </div>
  </div>
</body>
</html>
